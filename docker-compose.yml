services:
  pptx-engine:
    build: ./pptx-engine
    entrypoint: ["echo", "pptx-engine built successfully"]

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - pptx-engine
    volumes:
      - ./pptx-engine:/app/pptx-engine
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local
    depends_on:
      - backend
    command: npm run dev
